<h2>Бархан Сарыкум (Дагестан)</h2>
<img src="https://avatars.mds.yandex.net/i?id=5c6726a569a1882d0cf86e0a3473bcc1_l-5354237-images-thumbs&n=13&n=13&w=690&h=460">
<p>
   Крупнейший песчаный бархан в Европе, расположенный в Кумторкалинском районе Дагестана, в 18 км от Махачкалы. Это одна из крупнейших песчаных дюн в Евразии, высота которой достигает 262 м, а площадь — 1175 га.
