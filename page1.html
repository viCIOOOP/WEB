<h2>Сулакский каньон (Дагестан)</h2>
<img src="https://avatars.mds.yandex.net/i?id=dd7099c6acab1b9de5bc7ff1ea322446_l-9844228-images-thumbs&n=13&n=13&w=690&h=460">
<p>
    Один из самых глубоких каньонов Европы — его глубина достигает 1920 метров, а длина — 53 километра. Расположен в долине реки Сулак 
    в центральной части Дагестана. Учёные считают, что каньон образовался десятки миллионов лет назад во время тектонических сдвигов.
 </p>
